name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  deploy:
    uses: "getpelican/pelican/.github/workflows/github_pages.yml@main"
    permissions:
      contents: "read"
      pages: "write"
      id-token: "write"
    with:
      settings: "publishconf.py"
      requirements: >-
        pelican[markdown]
        typogrify
        pelican-sitemap
        git+https://github.com/getpelican/pelican-plugins.git#egg=pelican-assets&subdirectory=assets
        git+https://github.com/getpelican/pelican-plugins.git#egg=pelican-i18n-subsites&subdirectory=i18n_subsites
      theme: "https://github.com/getpelican-themes/pelican-blueidea.git"
      python: "3.12"
