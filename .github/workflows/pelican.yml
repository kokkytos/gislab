name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  deploy:
    uses: "getpelican/pelican/.github/workflows/github_pages.yml@main"
    permissions:
      contents: "read"
      pages: "write"
      id-token: "write"
    with:
          settings: "publishconf.py"
          # This replaces your python subprocess script logic:
          extra_args: "--extra-settings SITEURL='\"https://gislab.gr\"' FEED_DOMAIN='\"https://gislab.gr\"' --output output/ --theme-path .theme"
          requirements: "pelican[markdown] typogrify pelican-sitemap webassets"
          theme: "https://github.com/getpelican-themes/pelican-blueidea.git"
          python: "3.12"
